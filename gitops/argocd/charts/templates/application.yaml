{{- range .Values.applications }}
apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: {{ .name }}
  namespace: argocd

spec:
  project: {{ .project }}

  source:
    repoURL: {{ .source.repoURL }}
    targetRevision: {{ .source.targetRevision }}
    path: {{ .source.path }}
    helm:
      valueFiles:
        - values.yaml

  destination:
    server: {{ .destination.server }}
    namespace: {{ .destination.namespace }}

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true

---
{{- end }}